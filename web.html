<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약초 찾기 모델</title>
</head>
<style>
    .text{ width: 380px;
        height: 67px;
        margin: 0 22.5px 0 88.5px;
        object-fit: contain;
        font-family: SegoeUI;
        font-size: 50px;
        font-weight: bold;
        font-stretch: normal;
        font-style: normal;
        line-height: normal;
        letter-spacing: normal;
        text-align: left;
        color: #82b57f;
    }
    #camera--trigger{
        width: 395.5px;
        height: 65px;
        margin: 99.5px 0 36.5px 95.5px;
        padding: 9.5px 174.5px 9.5px 175px;
        object-fit: contain;
        border-radius: 32.5px;
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
        box-shadow: 7px 5px 3px 0 rgba(0, 0, 0, 0.16);
        background-color: #7fb77e;
    }
    .back{
        width: 960px;
  height: 540px;
  padding: 61.5px 40.5px 82.5px 64px;
    background-color: #f7f6dc;
    }
    .camera{
        width: 46px;
        height: 46px;
        object-fit: contain;
      }
      .text2{width: 288.5px;
        height: 100.5px;
        margin: 27.5px 107px 99.5px 95.5px;
        object-fit: contain;
        font-family: SegoeUI;
        font-size: 25px;
        font-weight: 300;
        font-stretch: normal;
        font-style: normal;
        line-height: normal;
        letter-spacing: normal;
        text-align: left;
        color: #b1d7b4;
      }
    
      
img.oran  {
    width: 329px;
  height: 329px;
  margin: 67px 88.5px 0 35.5px;
  object-fit: contain;
  opacity: 0.82;
  border-radius: 27px;
  -webkit-backdrop-filter: blur(16.5px);
  backdrop-filter: blur(16.5px);
  box-shadow: 5px 5px 3px 0 rgba(86, 67, 67, 0.16);
  border: solid 3.5px #fff;
  background-color: #ffc090;
  }
  img.green  {
    width: 329px;
  height: 329px;
  margin: 30.5px 124px 36.5px 0;
  padding: 31.5px;
  object-fit: contain;
  opacity: 0.82;
  border-radius: 27px;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  box-shadow: 5px 5px 3px 0 rgba(86, 67, 67, 0.16);
  border: solid 3.5px #fff;
  background-color: #b1d7b4;
  }
  img.tree {width: 266px;
    height: 266px;
    object-fit: contain;
    border-radius: 22.5px;
  }
</style>
<body class = 'back'>
   
    <h1 class = 'text'>약초를 찾아내자!</h1>
    <h3 class = 'text2'>카메라 클릭한 후에<br>약초라고 생각되는 식물을<br>촬영 해 주세요:D</h3>
    <img src="tree.png" class="green">
    <main id="camera">

        <canvas id="camera--sensor"></canvas>

        <!-- 기기의 카메라에 접근하여 영상을 페이지에 재생한다. -->
        <video id="camera--view" autoplay playsinline></video>

        <img src="//:0" alt="" id="camera--output">

        <button id="camera--trigger"><img src="camera.png" class = "camera"></button>

</main>
<script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk="
        crossorigin="anonymous"></script>
    <script>

        let constraints = { video: { facingMode: "user"}, audio: false};
        const cameraView = document.querySelector("#camera--view");
        const cameraSensor = document.querySelector("#camera--sensor");
        const cameraTrigger = document.querySelector("#camera--trigger");


        function cameraStart(){
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream){
                    track = stream.getTracks()[0];
                    cameraView.srcObject = stream;
                })
                .catch(function(error){
                    console.error("카메라에 문제가 있습니다.", error);
                })
        }

        //촬영 버튼 클릭 리스너
        cameraTrigger.addEventListener("click", function(){
            cameraSensor.width = cameraView.videoWidth; //640으로 정해져서 나오네?
            cameraSensor.height = cameraView.videoHeight;
            cameraSensor.getContext("2d").drawImage(cameraView, 0, 0);

            let imageCapture = new ImageCapture(cameraView.srcObject.getTracks()[0]);

            imageCapture.takePhoto().then(function(blob) {
                console.log('Took photo:', blob);
                var fd = new FormData();
                fd.append('data', blob);
                console.log("보냄");
                $.ajax({
                    url: "/image",
                    data: fd,
                    type: "POST",
                    processData: false,
                    contentType: false
                 }).done(function(json) {
                    console.log("받음");
                 });
            }).catch(function(error) {
                console.log('takePhoto() error: ', error);
            });

        });

        // 페이지가 로드되면 함수 실행
        window.addEventListener("load", cameraStart, false);
    </script>
</body>
</html>
